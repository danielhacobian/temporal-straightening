name: Request an AWS experiment

on:
  push:
    tags:
      - "train-smoke-*"
      - "train-anchor-*"
      - "train-screen-*"
      - "train-finalists-*"
      - "train-scale-*"
      - "train-chunk-*"
      - "train-run-*"
  workflow_dispatch:

permissions: {}

jobs:
  broker:
    name: Call the trusted AWS experiment broker
    permissions:
      contents: read
      id-token: write # Passed to the pinned reusable broker for AWS OIDC.
    # GitHub's caller syntax takes the branch name; the resulting OIDC
    # job_workflow_ref claim resolves it to this path at refs/heads/infra.
    uses: danielhacobian/temporal-straightening/.github/workflows/aws-paid-broker.yml@infra # zizmor: ignore[unpinned-uses]
