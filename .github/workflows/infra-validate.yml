name: Validate AWS infrastructure

on:
  pull_request:
    paths:
      - ".github/workflows/infra-*.yml"
      - ".github/workflows/aws-*.yml"
      - "infra/**"
      - "conf/**"
      - "datasets/point_maze_dset.py"
      - "models/dino.py"
      - "models/visual_world_model.py"
      - "plan.py"
      - "train.py"
  push:
    branches:
      - infra
    paths:
      - ".github/workflows/infra-*.yml"
      - ".github/workflows/aws-*.yml"
      - "infra/**"
      - "conf/**"
      - "datasets/point_maze_dset.py"
      - "models/dino.py"
      - "models/visual_world_model.py"
      - "plan.py"
      - "train.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: infra-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint and test the infrastructure
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the requested revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install validation-only dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          PyYAML==6.0.3 cfn-lint==1.53.0 pip-audit==2.10.1
          hydra-core==1.2.0 hydra-submitit-launcher==1.2.0
          omegaconf==2.3.0 submitit==1.5.1

      - name: Lint every GitHub Actions workflow
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Lint the CloudFormation template
        run: cfn-lint --regions us-east-2 --template infra/aws/template.yaml

      - name: Audit pinned direct runtime dependencies
        run: >-
          pip-audit --requirement infra/container/requirements.txt
          --no-deps --disable-pip

      - name: Validate every experiment manifest
        shell: bash
        run: |
          python -m infra.experiments.runner validate \
            infra/experiments/manifests/*.yaml
          python -m infra.experiments.custom_manifest validate \
            infra/experiments/manifests/custom/*.yaml

      - name: Run infrastructure unit tests
        run: python -m unittest discover -s infra/tests -v

      - name: Check Python and shell entrypoints
        shell: bash
        run: |
          python -m py_compile infra/experiments/*.py infra/aws/*.py infra/container/*.py
          bash -n infra/aws/*.sh infra/container/*.sh
