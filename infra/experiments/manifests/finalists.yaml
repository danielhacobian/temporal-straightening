schema_version: 1
name: umaze_finalists
paper_version: arXiv:2603.12231v1 plus normalized-acceleration candidate
environment:
  name: PointMaze UMaze
  hydra: point_maze
  maze: umaze
  goal_horizon: 25
dataset:
  uri: ${TS_UMAZE_DATASET_S3_URI}
  sha256: ${TS_UMAZE_DATASET_SHA256}
  version_id: ${TS_UMAZE_DATASET_VERSION_ID}
  archive: zip
  leaf: point_maze
  rollouts: 200
goal_set:
  uri: ${TS_UMAZE_GOALS_S3_URI}
  sha256: ${TS_UMAZE_GOALS_SHA256}
  version_id: ${TS_UMAZE_GOALS_VERSION_ID}
  count: 50
seed_sets:
  - data_seed: 10
    train_seed: 20
    planner_seed: 100
  - data_seed: 11
    train_seed: 21
    planner_seed: 101
  - data_seed: 12
    train_seed: 22
    planner_seed: 102
variants:
  - name: our_normacc_candidate
    hydra_overrides:
      encoder: dino_channel
      training.straighten: normacc1e-1
      training.encoder_lr: 1.0e-5
  - name: paper_curvature
    hydra_overrides:
      encoder: dino_channel
      training.straighten: aggcos1e-1
      training.encoder_lr: 1.0e-5
  - name: projector_only
    hydra_overrides:
      encoder: dino_channel
      training.straighten: false
      training.encoder_lr: 1.0e-6
epochs: 20
hydra_overrides:
  train:
    training.batch_size: 32
    training.save_every_x_epoch: 1
    training.save_every_x_iterations: 0
    training.decoder_start_epoch: 999
    training.reconstruct_every_x_batch: 999999
    env.num_workers: 8
    plan_settings.plan_cfg_path: null
  plan:
    objective.alpha: 0
    objective.mode: last
    planner.max_iter: 1
    planner.n_taken_actions: 25
    planner.sub_planner.horizon: 25
    planner.sub_planner.lr: 0.01
    planner.sub_planner.sample_type: zero
    planner.sub_planner.action_noise: 0
    planner.sub_planner.opt_steps: 100
    planner.sub_planner.eval_every: -1
    decode_for_viz: false
    +wandb_logging: false
stages:
  - train
  - proxy
  - plan
cost_envelope:
  max_hours: 12
  max_hourly_usd: 0.40
  max_usd: 8
artifact_prefix: ${TS_ARTIFACT_PREFIX}/finalists
