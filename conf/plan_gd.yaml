defaults:
  - _self_
  - override hydra/launcher: submitit_slurm

hydra:
  run:
    dir: plan_outputs_gd/${replace_slash:${model_name}}_gH${goal_H}_${goal_source}/${ckpt_base_path}_gd_lr${planner.sub_planner.lr}_an${planner.sub_planner.action_noise}_opt${planner.sub_planner.opt_steps}_obj${objective.mode}_init${planner.sub_planner.sample_type}
  sweep:
    dir: plan_outputs_gd/${replace_slash:${model_name}}_gH${goal_H}_${goal_source}/${ckpt_base_path}_gd_lr${planner.sub_planner.lr}_an${planner.sub_planner.action_noise}_opt${planner.sub_planner.opt_steps}_obj${objective.mode}_init${planner.sub_planner.sample_type}
    subdir: ${hydra.job.num}
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    nodes: 1
    tasks_per_node: 1
    cpus_per_task: 16
    mem_gb: 256
    gres: "gpu:h100:1"
    qos: "explore"
    timeout_min: 720
    setup: ["export DEBUGVAR=$(scontrol show hostnames $SLURM_JOB_NODELIST)",
            export MASTER_ADDR="$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n 1)",
            "export MASTER_PORT=$(for port in $(shuf -i 30000-65500 -n 20); do if [[ $(netstat -tupln 2>&1 | grep $port | wc -l) -eq 0 ]] ; then echo $port; break; fi; done;)",]

ckpt_base_path: ./checkpoints # model to load for planning
model_name: null
model_epoch: latest

seed: 100
n_evals: 50
goal_source: 'dset'
goal_file_path: null  # required when goal_source=file; supplied by the infra runner
goal_H: 25 
n_plot_samples: 10
decode_for_viz: true  # if false, skip world-model decoding/rollout visualization during eval
num_start_frames: 1

debug_dset_init: False

objective:
  _target_: planning.objectives.create_objective_fn
  alpha: 0
  base: 2 
  mode: last

planner:
  _target_: planning.mpc.MPCPlanner
  max_iter: 1
  n_taken_actions: 25
  sub_planner:
    target: planning.gd.GDPlanner
    lr: 0.1
    sample_type: zero
    action_noise: 0
    horizon: 25
    var_scale: 1
    opt_steps: 100
    eval_every: -1
  name: mpc_gd
