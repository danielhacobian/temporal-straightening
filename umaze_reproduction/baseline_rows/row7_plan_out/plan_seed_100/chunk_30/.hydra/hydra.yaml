hydra:
  run:
    dir: /home/jupyter-deuk-e40b/row7_plan_out/plan_seed_100/chunk_30
  sweep:
    dir: plan_outputs_gd/${replace_slash:${model_name}}_gH${goal_H}_${goal_source}/${ckpt_base_path}_gd_lr${planner.sub_planner.lr}_an${planner.sub_planner.action_noise}_opt${planner.sub_planner.opt_steps}_obj${objective.mode}_init${planner.sub_planner.sample_type}
    subdir: ${hydra.job.num}
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    timeout_min: 720
    cpus_per_task: 16
    gpus_per_node: null
    tasks_per_node: 1
    mem_gb: 256
    nodes: 1
    name: ${hydra.job.name}
    stderr_to_stdout: false
    _target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
    partition: null
    qos: explore
    comment: null
    constraint: null
    exclude: null
    gres: gpu:h100:1
    cpus_per_gpu: null
    gpus_per_task: null
    mem_per_gpu: null
    mem_per_cpu: null
    account: null
    signal_delay_s: 120
    max_num_timeout: 0
    additional_parameters: {}
    array_parallelism: 256
    setup:
    - export DEBUGVAR=$(scontrol show hostnames $SLURM_JOB_NODELIST)
    - export MASTER_ADDR="$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n
      1)"
    - export MASTER_PORT=$(for port in $(shuf -i 30000-65500 -n 20); do if [[ $(netstat
      -tupln 2>&1 | grep $port | wc -l) -eq 0 ]] ; then echo $port; break; fi; done;)
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=/home/jupyter-deuk-e40b/row7_plan_out/plan_seed_100/chunk_30
    - hydra.mode=RUN
    task:
    - ckpt_base_path=/home/jupyter-deuk-e40b/ts_ckpts_row7/test/umaze_False_agg32_projchannel_dim8_hw14_sgTrue_lr1e-06
    - model_epoch=20
    - n_evals=10
    - +eval_start_index=30
    - seed=100
    - decode_for_viz=true
  job:
    name: plan
    chdir: null
    override_dirname: +eval_start_index=30,ckpt_base_path=/home/jupyter-deuk-e40b/ts_ckpts_row7/test/umaze_False_agg32_projchannel_dim8_hw14_sgTrue_lr1e-06,decode_for_viz=true,model_epoch=20,n_evals=10,seed=100
    id: ???
    num: ???
    config_name: plan_gd.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.2.0
    version_base: '1.1'
    cwd: /opt/dlami/nvme/home/jupyter-deuk-e40b/ts-cls
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /opt/dlami/nvme/home/jupyter-deuk-e40b/ts-cls/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/jupyter-deuk-e40b/row7_plan_out/plan_seed_100/chunk_30
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: submitit_slurm
      hydra/output: default
  verbose: false
